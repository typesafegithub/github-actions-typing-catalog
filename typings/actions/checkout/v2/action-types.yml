# See https://github.com/typesafegithub/github-actions-typing
inputs:
  clean:
    type: boolean
  fetch-depth:
    type: integer
  lfs:
    type: boolean
  path:
    type: string
  persist-credentials:
    type: boolean
  ref:
    type: string
  repository:
    type: string
  set-safe-directory:
    type: boolean
  ssh-key:
    type: string
  ssh-known-hosts:
    type: string
  ssh-strict:
    type: boolean
  submodules:
    type: boolean
  token:
    type: string
