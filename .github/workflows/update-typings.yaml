name: 'Update typings'
on:
  schedule:
  - cron: '0 7 * * *'
  workflow_dispatch: {}
jobs:
  check_yaml_consistency:
    name: 'Check YAML consistency'
    runs-on: 'ubuntu-latest'
    steps:
    - id: 'step-0'
      name: 'Check out'
      uses: 'actions/checkout@v6'
    - id: 'step-1'
      name: 'Execute script'
      run: 'rm ''.github/workflows/update-typings.yaml'' && ''.github/workflows/update-typings.main.kts'''
    - id: 'step-2'
      name: 'Consistency check'
      run: 'git diff --exit-code ''.github/workflows/update-typings.yaml'''
  update_typings:
    runs-on: 'ubuntu-latest'
    permissions:
      id-token: 'write'
      contents: 'write'
      pull-requests: 'write'
    needs:
    - 'check_yaml_consistency'
    steps:
    - id: 'step-0'
      uses: 'actions/checkout@v6'
    - id: 'check_last_run'
      name: 'Check if latest workflow run failed'
      run: |-
        CONCLUSION=$(gh run list --workflow .github/workflows/test.yaml --limit 1 --json conclusion --jq '.[0].conclusion // ""' 2>/dev/null)
        echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"
    - id: 'print_conclusion'
      name: 'Print conclusion'
      run: 'echo "Conclusion: ${{ steps.check_last_run.outputs.conclusion }}"'
    - id: 'step-3'
      uses: 'anomalyco/opencode/github@latest'
      with:
        model: 'opencode/big-pickle'
        prompt: 'Run the /update-typings command'
        use_github_token: 'true'
      env:
        GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      if: '${{ steps.check_last_run.outputs.conclusion == ''failure'' || steps.check_last_run.outputs.conclusion == '''' }}'
